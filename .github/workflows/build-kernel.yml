name: Build RPi-Kernel Installer Base

# Builds the installer-base OCI image used by publish.yml, with the
# Raspberry Pi vendor kernel (raspberrypi/linux rpi-6.18.y) instead of
# the upstream stable kernel.
#
# The kernel package itself is built by the reusable build-kernel-pkg.yml
# workflow and tagged by content hash, so reruns that don't touch the
# kernel config / pkgs patch / linux_ref skip the kernel rebuild and
# reuse the published image.
#
# Output: ghcr.io/<owner>/rpi-talos:<installer_tag>
#   default tag: v1.13.0-k-rpi
#
# Trigger:
#   - workflow_dispatch  (manual)
#   - push of a tag matching v*-kernel  (e.g. v1.13.0-kernel)

on:
  workflow_dispatch:
    inputs:
      talos_version:
        description: 'Talos version (e.g. v1.13.0)'
        required: false
        default: 'v1.13.0'
      pkg_version:
        description: 'siderolabs/pkgs ref — must match the base of the vendored Pkgfile patch (anchored on tag v1.13.0)'
        required: false
        default: 'v1.13.0'
      linux_ref:
        description: 'raspberrypi/linux short SHA pinned by the vendored Pkgfile patch — workflow asserts the vendored patch matches'
        required: false
        default: '79dc190b12f9'
      installer_tag:
        description: 'Output image tag (e.g. v1.13.0-k-rpi)'
        required: false
        default: 'v1.13.0-k-rpi'
      kernel_image:
        description: 'Optional: fully-qualified kernel image ref to use (e.g. ghcr.io/me/kernel-rpi:my-tag). If set, skips both cache lookup and kernel rebuild.'
        required: false
        default: ''
      force_rebuild_kernel:
        description: 'Force a kernel rebuild even if the content-hashed kernel image is already published'
        required: false
        type: boolean
        default: false
      runner:
        description: 'GitHub Actions runner (e.g. ubuntu-24.04-arm, mac-runner)'
        required: false
        default: 'ubuntu-24.04-arm'
  push:
    tags:
      - 'v*-kernel'

jobs:
  # ── Resolve versions + decide whether the kernel needs rebuilding ─────────
  resolve:
    runs-on: ${{ inputs.runner || 'ubuntu-24.04-arm' }}
    permissions:
      contents: read
      packages: read
    outputs:
      talos_version: ${{ steps.ver.outputs.talos_version }}
      pkg_version: ${{ steps.ver.outputs.pkg_version }}
      linux_ref: ${{ steps.ver.outputs.linux_ref }}
      installer_tag: ${{ steps.ver.outputs.installer_tag }}
      runner: ${{ steps.ver.outputs.runner }}
      kernel_image: ${{ steps.kernel.outputs.kernel_image }}
      kernel_cached: ${{ steps.kernel.outputs.kernel_cached }}
      kernel_user_supplied: ${{ steps.kernel.outputs.kernel_user_supplied }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up crane
        uses: imjasonh/setup-crane@v0.4
        with:
          version: v0.20.5

      - name: Log in to GHCR (for manifest probe)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve versions
        id: ver
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG="${{ github.ref_name }}"
            TALOS_VERSION=$(echo "$TAG" | grep -oE '^v[0-9]+\.[0-9]+\.[0-9]+')
            PKG_VERSION="v1.13.0"
            LINUX_REF="79dc190b12f9"
            INSTALLER_TAG="${TALOS_VERSION}-k-rpi"
            RUNNER="ubuntu-24.04-arm"
          else
            TALOS_VERSION="${{ github.event.inputs.talos_version }}"
            PKG_VERSION="${{ github.event.inputs.pkg_version }}"
            LINUX_REF="${{ github.event.inputs.linux_ref }}"
            INSTALLER_TAG="${{ github.event.inputs.installer_tag }}"
            RUNNER="${{ github.event.inputs.runner }}"
          fi
          echo "talos_version=${TALOS_VERSION}" >> "$GITHUB_OUTPUT"
          echo "pkg_version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "linux_ref=${LINUX_REF}" >> "$GITHUB_OUTPUT"
          echo "installer_tag=${INSTALLER_TAG}" >> "$GITHUB_OUTPUT"
          echo "runner=${RUNNER}" >> "$GITHUB_OUTPUT"
          echo "Resolved: Talos=${TALOS_VERSION}  pkgs=${PKG_VERSION}  linux-ref=${LINUX_REF}  tag=${INSTALLER_TAG}  runner=${RUNNER}"

      - name: Assert vendored Pi-fork patch matches linux_ref
        run: |
          set -euo pipefail
          PATCH=patches/pkgs/0001-Patched-for-Raspberry-Pi-5.patch
          REF="${{ steps.ver.outputs.linux_ref }}"
          if ! grep -q "linux_version: ${REF}" "$PATCH"; then
            echo "ERROR: vendored patch does not pin linux_version to ${REF}" >&2
            grep -E '^\+.*linux_version:' "$PATCH" >&2 || true
            exit 1
          fi
          echo "OK: vendored patch pins raspberrypi/linux ${REF}"

      - name: Decide kernel image (user override / cache hit / rebuild)
        id: kernel
        env:
          USER_KERNEL_IMAGE: ${{ github.event.inputs.kernel_image }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild_kernel }}
          LINUX_REF: ${{ steps.ver.outputs.linux_ref }}
        run: |
          set -euo pipefail

          # 1) User-supplied override wins.
          if [[ -n "${USER_KERNEL_IMAGE:-}" ]]; then
            echo "User supplied kernel_image: ${USER_KERNEL_IMAGE}"
            echo "kernel_image=${USER_KERNEL_IMAGE}" >> "$GITHUB_OUTPUT"
            echo "kernel_cached=true"            >> "$GITHUB_OUTPUT"
            echo "kernel_user_supplied=true"     >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "kernel_user_supplied=false" >> "$GITHUB_OUTPUT"

          # 2) Compute content-hashed tag. Inputs that affect the kernel:
          #    - linux_ref (kernel source revision)
          #    - patches/pkgs/0001-Patched-for-Raspberry-Pi-5.patch (Pkgfile delta)
          #    - patches/pkgs/config-arm64-rpi (kernel .config)
          HASH=$(
            {
              echo "linux_ref:${LINUX_REF}"
              sha256sum patches/pkgs/0001-Patched-for-Raspberry-Pi-5.patch
              sha256sum patches/pkgs/config-arm64-rpi
            } | sha256sum | cut -c1-8
          )
          TAG="${LINUX_REF}-${HASH}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/kernel-rpi:${TAG}"
          echo "Content-hashed kernel image: ${IMAGE}"
          echo "kernel_image=${IMAGE}" >> "$GITHUB_OUTPUT"

          # 3) Probe GHCR — skip rebuild if the tag already exists, unless forced.
          if [[ "${FORCE_REBUILD}" == "true" ]]; then
            echo "force_rebuild_kernel=true; will rebuild even if cached"
            echo "kernel_cached=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if crane manifest "${IMAGE}" >/dev/null 2>&1; then
            echo "Cache hit: ${IMAGE} already exists"
            echo "kernel_cached=true" >> "$GITHUB_OUTPUT"
          else
            echo "Cache miss: ${IMAGE} not in registry"
            echo "kernel_cached=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Build the kernel package only if no cached image is available ─────────
  build-kernel:
    needs: resolve
    if: ${{ needs.resolve.outputs.kernel_cached != 'true' }}
    uses: ./.github/workflows/build-kernel-pkg.yml
    with:
      pkg_version: ${{ needs.resolve.outputs.pkg_version }}
      linux_ref: ${{ needs.resolve.outputs.linux_ref }}
      kernel_image: ${{ needs.resolve.outputs.kernel_image }}
      runner: ${{ needs.resolve.outputs.runner }}
    permissions:
      contents: read
      packages: write
    secrets: inherit

  # ── Build imager + installer-base against the resolved kernel image ───────
  build-installer:
    needs: [resolve, build-kernel]
    # Run if kernel is cached (build-kernel skipped) or if it just built successfully.
    if: ${{ always() && needs.resolve.result == 'success' && (needs.build-kernel.result == 'success' || needs.build-kernel.result == 'skipped') }}
    runs-on: ${{ needs.resolve.outputs.runner }}
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      REGISTRY_USERNAME: ${{ github.repository_owner }}
      KERNEL_IMAGE: ${{ needs.resolve.outputs.kernel_image }}

    steps:
      - name: Preflight disk cleanup (self-hosted safe)
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"
          df -h
          docker system prune -af --volumes || true
          docker builder prune -af || true
          if [[ -d /actions-runner/_diag ]]; then
            sudo find /actions-runner/_diag -type f -name '*.log' -mtime +2 -print -delete || true
          fi
          if [[ -d /actions-runner/_work/_temp ]]; then
            sudo rm -rf /actions-runner/_work/_temp/* || true
          fi
          echo "Disk after cleanup:"
          df -h

      - name: Checkout talos-rpi-builder
        uses: actions/checkout@v4

      - name: Set up Git identity (required for git am)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up crane
        uses: imjasonh/setup-crane@v0.4
        with:
          version: v0.20.5

      - name: Confirm kernel image is reachable
        run: |
          set -euo pipefail
          echo "Using kernel image: ${KERNEL_IMAGE}"
          crane manifest "${KERNEL_IMAGE}" >/dev/null

      - name: Clone siderolabs/talos
        run: |
          git clone -c advice.detachedHead=false \
            --branch "${{ needs.resolve.outputs.talos_version }}" \
            https://github.com/siderolabs/talos.git checkouts/talos

      - name: Apply RPi modules-arm64.txt patch to talos
        run: |
          set -euo pipefail
          cp patches/talos/0001-modules-arm64-rpi.patch checkouts/talos/
          git -C checkouts/talos am 0001-modules-arm64-rpi.patch
          rm -f checkouts/talos/0001-modules-arm64-rpi.patch
          echo "modules-arm64.txt head after patch:"
          head -5 checkouts/talos/hack/modules-arm64.txt

      - name: Build and push imager (RPi 4K kernel + matching initramfs)
        run: |
          cd checkouts/talos
          make \
            TAG=${{ needs.resolve.outputs.talos_version }}-rpi \
            REGISTRY=${{ env.REGISTRY }} \
            USERNAME=${{ env.REGISTRY_USERNAME }} \
            PUSH=true \
            PKG_KERNEL=${KERNEL_IMAGE} \
            INSTALLER_ARCH=arm64 \
            PLATFORM=linux/arm64 \
            imager

      - name: Build and push installer-base
        run: |
          cd checkouts/talos
          make \
            TAG=${{ needs.resolve.outputs.talos_version }}-rpi \
            REGISTRY=${{ env.REGISTRY }} \
            USERNAME=${{ env.REGISTRY_USERNAME }} \
            PUSH=true \
            PKG_KERNEL=${KERNEL_IMAGE} \
            INSTALLER_ARCH=arm64 \
            PLATFORM=linux/arm64 \
            installer-base

      # The imager target publishes as imager:<tag>-rpi; rename to imager-rpi:<tag>-rpi
      # so publish.yml can reference a stable name independent of the talos tag.
      - name: Tag imager as imager-rpi
        run: |
          crane copy \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/imager:${{ needs.resolve.outputs.talos_version }}-rpi \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/imager-rpi:${{ needs.resolve.outputs.talos_version }}-rpi

      # ── Publish under stable rpi-talos name ───────────────────────────────

      - name: Publish as rpi-talos
        run: |
          crane copy \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/installer-base:${{ needs.resolve.outputs.talos_version }}-rpi \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/rpi-talos:${{ needs.resolve.outputs.installer_tag }}

      - name: Postflight BuildKit cleanup
        if: always()
        run: |
          set +e
          docker ps -a --format '{{.Names}}' | grep '^buildx_buildkit_' | xargs -r docker rm -f
          docker volume ls --format '{{.Name}}' | grep '^buildx_buildkit_.*_state$' | xargs -r docker volume rm
          docker builder prune -af || true
          docker system prune -af --volumes || true
          df -h

      - name: Summary
        run: |
          KERNEL_SOURCE=""
          if [[ "${{ needs.resolve.outputs.kernel_user_supplied }}" == "true" ]]; then
            KERNEL_SOURCE="user-supplied"
          elif [[ "${{ needs.build-kernel.result }}" == "skipped" ]]; then
            KERNEL_SOURCE="cache hit (skipped rebuild)"
          else
            KERNEL_SOURCE="freshly built"
          fi
          echo "## RPi-Kernel Installer Base Built" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Talos | \`${{ needs.resolve.outputs.talos_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| pkgs | \`${{ needs.resolve.outputs.pkg_version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| kernel source | \`raspberrypi/linux\` rpi-6.18.y @ \`${{ needs.resolve.outputs.linux_ref }}\` (vendored Pkgfile patch) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| kernel image | \`${KERNEL_IMAGE}\` (${KERNEL_SOURCE}) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Installer base | \`${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/rpi-talos:${{ needs.resolve.outputs.installer_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Patched imager | \`${{ env.REGISTRY }}/${{ env.REGISTRY_USERNAME }}/imager-rpi:${{ needs.resolve.outputs.talos_version }}-rpi\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "publish.yml will use the patched imager automatically (kernel comes from inside the imager, not installer-base)." >> "$GITHUB_STEP_SUMMARY"
